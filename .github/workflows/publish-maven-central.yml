name: Publish Maven Central

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.1.0 or v0.1.0"
        required: true
        type: string

concurrency:
  group: publish-maven-central-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: macos-latest
    timeout-minutes: 90
    environment: maven
    permissions:
      contents: write
    env:
      CI: "true"
      ONCEKMP_REPO_URL: https://github.com/${{ github.repository }}
      ONCEKMP_SCM_CONNECTION: scm:git:git://github.com/${{ github.repository }}.git
      ONCEKMP_SCM_DEVELOPER_CONNECTION: scm:git:ssh://git@github.com/${{ github.repository }}.git

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          raw_version="${INPUT_VERSION:-$REF_NAME}"
          version="${raw_version#v}"

          if [[ -z "${version}" ]]; then
            echo "::error::Release version is empty."
            exit 1
          fi

          if [[ ! "${version}" =~ ^[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Unsupported release version '${version}'."
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "Publishing version ${version}"

      - name: Run release checks
        run: >
          ./gradlew
          --no-configuration-cache
          :onceKmp:allTests
          :onceKmpSample:compileAndroidMain
          :onceKmpSample:compileKotlinDesktop

      - name: Publish to Maven Central
        env:
          ONCEKMP_VERSION: ${{ steps.version.outputs.value }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
        run: ./scripts/publish-oncekmp.sh central

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG_NAME} already exists."
            exit 0
          fi

          gh release create "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG_NAME}" \
            --notes "Maven Central release ${VERSION}"
